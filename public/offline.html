<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Swastik Medicare</title>
  <style>
    body {
      font-family: 'Outfit', sans-serif, system-ui;
      background-color: #F8FDFF;
      color: #1D2D35;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      color: #006D77;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      color: #5C6B73;
      margin: 0 0 30px;
    }
    .btn {
      background: #006D77;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 10px 20px rgba(0,109,119,0.15);
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>No Internet Connection</h1>
  <p>Swastik Medicare requires an active internet connection to securely fetch your medical records and product catalogs.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
